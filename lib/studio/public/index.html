<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>brighttest studio</title>
  <link rel="stylesheet" href="/studio.css" />
</head>
<body>
  <header>
    <strong>brighttest studio</strong>
    <span id="device" class="muted">connecting…</span>
    <span class="spacer"></span>
    <label class="toggle"><input type="checkbox" id="showAll" /> show all nodes</label>
    <label class="toggle"><input type="checkbox" id="live" checked /> live</label>
    <span id="status" class="muted"></span>
  </header>

  <main>
    <section id="stageWrap">
      <div id="stage">
        <img id="shot" alt="device screen" />
        <svg id="overlay" preserveAspectRatio="none"></svg>
      </div>
      <div id="remote">
        <div class="pad">
          <button data-key="Up">▲</button>
          <div class="row">
            <button data-key="Left">◀</button>
            <button data-key="Select" class="ok">OK</button>
            <button data-key="Right">▶</button>
          </div>
          <button data-key="Down">▼</button>
        </div>
        <div class="keys">
          <button data-key="Back">Back</button>
          <button data-key="Home">Home</button>
        </div>
      </div>
    </section>

    <aside id="panel">
      <h2>Node</h2>
      <div id="detail" class="muted">Hover a box to preview · click to pin details.</div>

      <h2>Flow</h2>
      <div class="flowbar">
        <select id="flowSelect"><option value="">— select a flow —</option></select>
        <button id="flowNew" title="new flow">＋</button>
        <button id="flowReload" title="reload list">⟳</button>
      </div>
      <textarea id="flowText" spellcheck="false" placeholder="Select or create a *.e2e.yaml flow. Click a node above, then ‘+ add’ an assertion here. Save writes the real project file."></textarea>
      <div class="flowbar">
        <button id="flowSave">Save</button>
        <button id="flowRun" class="run">Run ▶</button>
        <span id="flowMsg" class="muted"></span>
      </div>
      <ol id="runSteps"></ol>
    </aside>
  </main>

  <script src="/app.js"></script>
</body>
</html>
