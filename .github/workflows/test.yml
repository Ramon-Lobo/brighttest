name: Test

# Runs the test suites on every push to main and on every pull request, across the
# supported Node.js versions (brighttest requires Node 22+ — brs-node crashes on older).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Fast unit suite across the supported Node versions (22 LTS + 24 current). Required to merge.
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22", "24"]
    name: test (node ${{ matrix.node-version }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run test:unit

  # Slower end-to-end suite: spawns the real CLI, compiles fixtures with bsc, runs them on the
  # brs-node simulator. Node 22 (the LTS floor) is enough — this exercises the runtime pipeline.
  integration:
    runs-on: ubuntu-latest
    name: integration (node 22)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run test:integration
