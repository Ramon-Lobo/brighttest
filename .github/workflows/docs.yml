name: Deploy Docs

# Builds the VitePress docs site and deploys it to GitHub Pages.
# Enable once in the repo: Settings → Pages → "Build and deployment" → Source: "GitHub Actions".
#
# NOTE: the docs build only needs the VitePress toolchain, so this installs just those packages
# (not the project's runtime deps). That keeps the docs deploy independent of whether the runtime
# packages are published to npm yet.
# Only run when something that affects the docs site actually changed. A push to `main` that
# doesn't touch any of these paths skips the workflow entirely (no build, no deploy). Manual
# `workflow_dispatch` runs ignore the paths filter, so you can always force a redeploy.
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/docs.yml"
  workflow_dispatch: {}

# Permissions required by actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/configure-pages@v5
      - name: Install docs toolchain
        # The docs build only needs the VitePress devDependencies. Drop the runtime `dependencies`
        # (@ramonlobo/* etc.) from the manifest first — npm would otherwise try to resolve them and
        # fail while they're unpublished, even though the docs don't use them.
        run: |
          npm pkg delete dependencies
          npm install --no-save --no-package-lock
      - name: Build docs
        run: npm run docs:build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
